name: CI Microsistemas

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.filter.outputs.changes }}
      any_app: ${{ steps.filter.outputs.apps }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          apps:
            - 'apps/**'
          docs:
            - '**.md'
            - 'docs/**'
          CapacitySim: 'apps/CapacitySim/**'
          Conversor: 'apps/Conversor/**'
          GitTrainer: 'apps/GitTrainer/**'
          JsTools: 'apps/JsTools/**'
          LogViewer: 'apps/LogViewer/**'
          PhpMigrator: 'apps/PhpMigrator/**'
          SqlViewer: 'apps/SqlViewer/**'
          YmlGenerator: 'apps/YmlGenerator/**'

  lint-docs:
    needs: changes
    if: ${{ needs.changes.outputs.docs == 'true' }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Markdown Lint
      uses: davidanson/markdownlint-cli2-action@v23
      with:
        config: .markdownlint.json
        globs: "**/*.md"

  lint-php:
    needs: [changes]
    if: ${{ needs.changes.outputs.any_app == 'true' }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        tools: php-cs-fixer, phpstan
    - name: Install Dependencies
      run: composer install --no-interaction --prefer-dist
    - name: PHP CS Fixer (Dry Run)
      run: php-cs-fixer fix --dry-run --diff
      continue-on-error: true
    - name: PHPStan
      run: phpstan analyze
    # --- Seguridad de dependencias PHP ----------------------------------------
    - name: Composer Audit (CVE scan de dependencias PHP)
      run: composer audit --no-interaction
      # Falla el job si encuentra vulnerabilidades conocidas en composer.lock.
      # Cubre: PHP Security Advisories DB, GitHub Advisory DB, FriendsOfPHP DB.

  # ---------------------------------------------------------------------------
  # Escaneo de codigo malicioso oculto (supply chain / Trojan Source)
  # Detecta caracteres Unicode bidireccionales usados para camuflar codigo
  # malicioso haciendolo ver inofensivo en editores (CVE-2021-42574).
  # Tambien valida integridad de composer.lock y busca patrones sospechosos.
  # ---------------------------------------------------------------------------
  supply-chain-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Verificar integridad de composer.lock
      run: |
        if [ ! -f composer.lock ]; then
          echo "ERROR: composer.lock ausente -- las dependencias no estan fijadas"
          exit 1
        fi
        echo "OK: composer.lock presente"

    - name: Scan Trojan Source -- Unicode bidi en codigo fuente
      run: |
        python3 - <<'PYEOF'
        import glob, sys
        # Caracteres bidi usados para invertir el orden visual del texto
        # y camuflar codigo malicioso (CVE-2021-42574 "Trojan Source")
        BIDI = [
            '\u202a', '\u202b', '\u202c', '\u202d', '\u202e',  # LRE/RLE/PDF/LRO/RLO
            '\u2066', '\u2067', '\u2068', '\u2069',            # LRI/RLI/FSI/PDI
            '\u200f', '\u200e',                                # RLM/LRM
        ]
        EXTENSIONS = ['**/*.php','**/*.js','**/*.py','**/*.sh','**/*.yml','**/*.ts']
        SKIP = ['vendor/', 'node_modules/', '.git/']
        found = []
        for pat in EXTENSIONS:
            for f in glob.glob(pat, recursive=True):
                if any(s in f for s in SKIP):
                    continue
                try:
                    txt = open(f, encoding='utf-8', errors='ignore').read()
                    hits = [hex(ord(c)) for c in BIDI if c in txt]
                    if hits:
                        found.append(f'{f} ({", ".join(hits)})')
                except Exception:
                    pass
        if found:
            print('ALERTA -- Unicode bidi detectado en:')
            for f in found:
                print(f'  {f}')
            sys.exit(1)
        print('OK: sin Unicode bidi sospechoso en codigo fuente')
        PYEOF

    - name: Scan patrones de codigo sospechoso (eval/base64/exec ocultos)
      run: |
        # Detecta tecnicas comunes de ofuscacion en PHP y JS:
        # eval(base64_decode), shell_exec, system() con variables, etc.
        # Solo fuera de vendor/ para no generar falsos positivos en libs.
        FOUND=0
        PATTERNS=(
          'eval\s*\(\s*base64_decode'
          'eval\s*\(\s*gzinflate'
          'eval\s*\(\s*str_rot13'
          'shell_exec\s*\(\s*\$_'
          'passthru\s*\(\s*\$_'
          'system\s*\(\s*\$_REQUEST'
          'preg_replace\s*\(\s*["\x27][^"]*\/e[imsu]*["\x27]'
          'assert\s*\(\s*\$_'
        )
        for pattern in "${PATTERNS[@]}"; do
          matches=$(grep -rP "$pattern" --include="*.php" --include="*.js" \
            --exclude-dir=vendor --exclude-dir=node_modules . 2>/dev/null || true)
          if [ -n "$matches" ]; then
            echo "ALERTA patron sospechoso ($pattern):"
            echo "$matches"
            FOUND=1
          fi
        done
        if [ "$FOUND" -eq 1 ]; then
          exit 1
        fi
        echo "OK: sin patrones de ofuscacion detectados"

  lint-python:
    needs: [changes]
    if: contains(needs.changes.outputs.apps, 'CapacitySim')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    - name: Install Ruff
      run: pip install ruff
    - name: Run Ruff
      run: ruff check .

  build-docker:
    needs: [changes]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build local image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: microsistemas-suite:local

      - name: Install Trivy
        run: |
          sudo apt-get update -y
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -y
          sudo apt-get install -y trivy

      - name: Run Trivy vulnerability scanner
        run: |
          trivy image \
            --format sarif \
            --output trivy-results.sarif \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            microsistemas-suite:local

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Build and push suite (Root)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/microsistemas-suite:latest
            ghcr.io/${{ github.repository_owner }}/microsistemas-suite:${{ github.sha }}

      - name: Generate SBOM (Suite)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/microsistemas-suite:latest
          artifact-name: sbom-suite.json
          output-format: 'spdx-json'

  # Job opcional para micro-apps con Dockerfile
  # Se puede extender con una matriz si se detectan más Dockerfiles
  build-apps-docker:
    needs: [changes]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect and build app images
        run: |
          for app_dir in apps/*; do
            if [ -f "$app_dir/Dockerfile" ]; then
              app_name=$(basename "$app_dir")
              echo "Construyendo imagen para $app_name..."
              # Lógica de build/push aquí
            fi
          done
